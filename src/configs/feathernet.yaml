# Data settings
data:
  data_dir: "./data/celeba-spoof-cropped-sampled/dataset"
  input_size: 224              # FeatherNet standard resolution (must be multiple of 32)
  use_fourier: false           # Does not use Fourier maps

# Model settings
model:
  name: "feathernetb"          # featherneta or feathernetb
  num_classes: 2
  pretrained: false

# Training settings
train:
  epochs: 150
  batch_size: 32
  lr: 0.01
  momentum: 0.9
  weight_decay: 0.0001
  milestones: [50, 100]        # Milestones for step decay policy
  gamma: 0.1
  device: "cuda"
  save_dir: "models"
  log_dir: "runs"
  log_interval: 10
