# Data settings
data:
  data_dir: "./data"           # Root data directory, containing train/val/test splits
  input_size: 128              # Target resolution (height and width) of the inputs
  use_fourier: true            # Whether to compute Fourier Transform auxiliary labels (for minifasv2)

# Model settings
model:
  name: "minifasv2"            # Model architecture to use (minifasv2, resnet18, etc.)
  num_classes: 2               # Number of output classes (0: Real/Live, 1: Spoof/Fake)
  embedding_size: 128          # Feature embedding size (specific to MiniFASNet architectures)
  pretrained: false            # Whether to load pre-trained weights if available

# Training settings
train:
  epochs: 50
  batch_size: 256
  lr: 0.1                      # Initial learning rate
  momentum: 0.9                # Optimizer momentum
  weight_decay: 0.0005         # Weight decay (L2 regularization)
  milestones: [10, 15, 22, 30] # Epochs at which learning rate will decay
  gamma: 0.1                   # Factor by which the learning rate will decay
  device: "cuda"               # Device choice ("cuda" or "cpu", auto-fallback will be implemented)
  save_dir: "models"           # Location to store model checkpoints (.pth)
  log_dir: "runs"              # Location for TensorBoard logs
  log_interval: 10             # Log metrics every N batches
