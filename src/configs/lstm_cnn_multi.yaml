# Data settings
data:
  data_dir: "./data/celeba-spoof-cropped-sampled/dataset"
  input_size: 256
  use_fourier: false           # Multi-frame model processes sequence of frames

# Model settings
model:
  name: "lstm_cnn_multi"
  num_classes: 2
  len_seq: 5
  multiplier: 2
  single_ratio: 0.5
  pretrained_single: "models/lstm_cnn_single_best.pth" # Path to pretrained single-frame model checkpoint

# Training settings
train:
  epochs: 20
  batch_size: 16               # Smaller batch size because multi-frame sequence has higher memory usage
  lr: 0.01
  momentum: 0.9
  weight_decay: 0.0005
  milestones: [5, 10, 15]
  gamma: 0.1
  device: "cuda"
  save_dir: "models"
  log_dir: "runs"
  log_interval: 10
  # Early stopping settings
  early_stopping_patience: 5
  early_stopping_monitor: "f1"
  # GPU optimizations
  num_workers: "auto"
  torch_compile: false
