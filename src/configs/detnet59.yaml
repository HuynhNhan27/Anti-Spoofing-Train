# Data settings
data:
  data_dir: "./data/celeba-spoof-cropped-sampled/dataset"
  input_size: 224              # DetNet59 standard input resolution
  use_fourier: false           # Does not use Fourier maps

# Model settings
model:
  name: "detnet59"
  num_classes: 2
  pretrained: false

# Training settings
train:
  epochs: 20
  batch_size: 64               # DetNet59 is heavy, lower batch size recommended to prevent Out Of Memory
  lr: 0.01                     # Recommended starting learning rate
  momentum: 0.9
  weight_decay: 0.0001
  milestones: [5, 10, 15]
  gamma: 0.1
  device: "cuda"
  save_dir: "models"
  log_dir: "runs"
  log_interval: 10
  # Early stopping settings
  early_stopping_patience: 5
  early_stopping_monitor: "f1"
  # GPU optimizations
  num_workers: "auto"
  torch_compile: false
