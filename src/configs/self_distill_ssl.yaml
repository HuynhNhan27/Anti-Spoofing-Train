# Data settings
data:
  data_dir: "/kaggle/input/datasets/nhnhunhc/celeba-spoof-cropped-sampled/dataset"
  input_size: 224              # Global crop resolution
  local_size: 96               # Local crop resolution
  global_crops_scale: [0.4, 1.0]
  local_crops_scale: [0.05, 0.4]
  local_crops_number: 6

# Model settings
model:
  out_dim: 4096                # Number of output prototype classes for DINO head

# Loss settings
loss:
  student_temp: 0.1
  warmup_teacher_temp: 0.04
  teacher_temp: 0.07
  warmup_teacher_temp_epochs: 10
  center_momentum: 0.9

# Training settings
train:
  epochs: 20
  batch_size: 64
  lr: 0.0005
  weight_decay: 0.04
  ema_momentum: 0.996          # Base EMA momentum for teacher updates
  device: "cuda"
  save_dir: "models"
  log_dir: "runs"
  num_workers: "auto"
