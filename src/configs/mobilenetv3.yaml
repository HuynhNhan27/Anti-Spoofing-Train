# Data settings
data:
  data_dir: "./data/celeba-spoof-cropped-sampled/dataset"
  input_size: 224              # Standard input resolution
  use_fourier: false           # Does not use Fourier maps

# Model settings
model:
  name: "mobilenetv3_large"    # Model architecture name (mobilenetv3_large or mobilenetv3_small)
  num_classes: 2
  width_mult: 1.0              # Channel scale factor
  prob_dropout: 0.2            # Feature map dropout rate
  type_dropout: "bernoulli"    # Type of dropout ('bernoulli', 'gaussian', or 'none')
  prob_dropout_linear: 0.2     # Linear classification head dropout rate
  embeding_dim: 128            # Final embedding dimension size
  theta: 0.7                   # Theta parameter for CDC (Central Difference Convolution, theta=0 means standard conv)
  multi_heads: false           # Whether to use semantic auxiliary heads

# Training settings
train:
  epochs: 80
  batch_size: 128
  lr: 0.1
  momentum: 0.9
  weight_decay: 0.0001
  milestones: [20, 40, 60]
  gamma: 0.1
  device: "cuda"
  save_dir: "models"
  log_dir: "runs"
  log_interval: 10
