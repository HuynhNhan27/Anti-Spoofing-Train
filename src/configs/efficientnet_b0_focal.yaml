# Data settings
data:
  data_dir: "./data/celeba-spoof-cropped-sampled/dataset"
  input_size: 224              # Standard resolution for EfficientNet-B0
  use_fourier: false           # EfficientNet-B0 does not use Fourier maps
  use_randaugment: true        # Enable custom SafeRandAugment search space
  ra_num_ops: 2                # Number of concurrent safe operations
  ra_magnitude: 9              # Magnitude parameter for SafeRandAugment

# Model settings
model:
  name: "efficientnet_b0"
  num_classes: 2
  pretrained: true

# Training settings
train:
  epochs: 20
  batch_size: 128
  lr: 0.01
  momentum: 0.9
  weight_decay: 0.0001
  milestones: [5, 10, 15]
  gamma: 0.1
  device: "cuda"
  save_dir: "models"
  log_dir: "runs"
  log_interval: 10
  # Early stopping settings
  early_stopping_patience: 5
  early_stopping_monitor: "tpr_at_1pct_fpr_interp"  # Match focal training metric
  # Focal Loss settings
  focal_loss_gamma: 2.0
  focal_loss_alpha: null
  # GPU optimizations
  num_workers: "auto"
  torch_compile: false
