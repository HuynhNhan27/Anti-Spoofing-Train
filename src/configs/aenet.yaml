# Data settings
data:
  data_dir: "./data/celeba-spoof-cropped-sampled/dataset"
  input_size: 224              # Standard resolution for AENet (ResNet-18 backbone)
  use_fourier: false           # Does not use Fourier maps

# Model settings
model:
  name: "aenet"
  num_classes: 2
  pretrained: false

# Training settings
train:
  epochs: 50
  batch_size: 64               # ResNet-18 baseline model size
  lr: 0.01
  momentum: 0.9
  weight_decay: 0.0001
  milestones: [15, 30, 40]
  gamma: 0.1
  device: "cuda"
  save_dir: "models"
  log_dir: "runs"
  log_interval: 10
