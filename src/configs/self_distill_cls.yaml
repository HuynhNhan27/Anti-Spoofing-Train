# Data settings
data:
  data_dir: "/root/.cache/kagglehub/datasets/nhnhunhc/celeba-spoof-cropped-sampled/versions/1/dataset"
  input_size: 224              # Resolution for ViT-Small classification
  use_fourier: false           # Does not use Fourier maps

# Model settings
model:
  name: "vit_small"
  num_classes: 2
  pretrained: false
  pretrained_backbone: "models/self_distill_ssl_best.pth" # Load Phase 1 teacher backbone weights

# Training settings
train:
  epochs: 20
  batch_size: 64
  lr: 0.01
  momentum: 0.9
  weight_decay: 0.0001
  milestones: [5, 10, 15]
  gamma: 0.1
  device: "cuda"
  save_dir: "models"
  log_dir: "runs"
  log_interval: 10
  # Early stopping settings
  early_stopping_patience: 5
  early_stopping_monitor: "f1"
  # GPU optimizations
  num_workers: "auto"
  torch_compile: false
